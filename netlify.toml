# Netlify config for Amore Movies (Next.js 15 App Router)
# The official Next.js runtime handles SSR + the /api/* serverless functions.

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"
  # GEMINI_MODEL is a model name (gemini-2.5-flash), not a secret. It legitimately
  # appears in source (lib/ai.ts default, .env.example, docs), so exempt it from
  # Netlify's secret scanner to avoid a false-positive deploy block.
  SECRETS_SCAN_OMIT_KEYS = "GEMINI_MODEL"

[[plugins]]
  package = "@netlify/plugin-nextjs"
